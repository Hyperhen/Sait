<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вступ до клубу - Волейбольний клуб Люті</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header site-header--compact">
    <a href="index.html" class="back-btn">← На головну</a>
    <div class="site-header__inner">
        <img src="img/logo.png" alt="Лого Люті" class="logo logo--compact" width="120">
        <p class="site-header__badge">заявка</p>
        <h1>Вступ до клубу Люті</h1>
        <p class="site-header__tagline">Подайте анкету — ми зателефонуємо або напишемо в Telegram</p>
    </div>
</header>

<main class="site-shell site-shell--join">
<section class="join-form-section">
    <h2 class="section-title section-title--center">Подати заявку</h2>
    <p class="join-form-section__lead">Заповніть поля нижче. Обовʼязкові позначені зірочкою *</p>
    
    <form id="registration-form">
        <div class="form-group">
            <label for="reg-name">Ім'я та прізвище:</label>
            <input type="text" id="reg-name" required placeholder="Введіть ваше повне ім'я">
        </div>
        <div class="form-group">
            <label for="reg-telegram">Telegram:</label>
            <input type="text" id="reg-telegram" required placeholder="@username">
        </div>
        <div class="form-group">
            <label for="reg-phone">Телефон (необов'язково):</label>
            <input type="tel" id="reg-phone" placeholder="+380XXXXXXXXX">
        </div>
        <div class="form-group">
            <label for="reg-age">Вік:</label>
            <input type="number" id="reg-age" min="10" max="100" required placeholder="Введіть ваш вік">
        </div>
        <div class="form-group">
            <label for="reg-experience">Досвід у волейболі:</label>
            <select id="reg-experience" required>
                <option value="">Оберіть рівень</option>
                <option value="beginner">Початківець</option>
                <option value="intermediate">Середній</option>
                <option value="advanced">Просунутий</option>
                <option value="professional">Професіонал</option>
            </select>
        </div>
        <div class="form-group">
            <label for="reg-message">Повідомлення (необов'язково):</label>
            <textarea id="reg-message" rows="4" placeholder="Розкажіть про себе, чому хочете приєднатися тощо..."></textarea>
        </div>
        <button type="submit" class="submit-btn">Подати заявку</button>
    </form>
</section>
</main>

<footer class="site-footer">
    <p>© 2026 Волейбольний клуб Люті. Всі права захищені.</p>
</footer>

<script>
// Реєстрація користувача
const regForm = document.getElementById('registration-form');
regForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('reg-name').value;
    const telegram = document.getElementById('reg-telegram').value;
    const phone = document.getElementById('reg-phone').value;
    const age = document.getElementById('reg-age').value;
    const experience = document.getElementById('reg-experience').value;
    const message = document.getElementById('reg-message').value;
    
    if (name && telegram && age && experience) {
        // Відправити на сервер
        try {
            const response = await fetch('/send-registration-email', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, telegram, phone, age, experience, message })
            });
            
            const result = await response.json();
            if (result.success) {
                alert('Дякуємо за заявку! Ми зв\'яжемося з вами найближчим часом.');
                this.reset();
            } else {
                alert('Сталася помилка. Спробуйте ще раз.');
            }
        } catch (error) {
            console.error('Помилка відправки:', error);
            alert('Сталася помилка з\'єднання. Спробуйте ще раз.');
        }
    } else {
        alert('Будь ласка, заповніть всі обов\'язкові поля.');
    }
});
</script>

</body>
</html>
